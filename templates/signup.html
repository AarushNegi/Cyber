<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --border:    #2a2a2a;
      --accent:    #00e5a0;
      --accent-dim:#00a372;
      --text:      #f0f0f0;
      --muted:     #666;
      --error:     #ff4d4d;
      --success:   #00e5a0;
    }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
 
    /* subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
    }
 
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      animation: fadeUp .4s ease both;
    }
 
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    /* accent glow on card top */
    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 2px;
      background: var(--accent);
      border-radius: 2px;
    }
 
    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
 
    h1 {
      font-size: 26px;
      font-weight: 500;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
 
    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 36px;
    }
 
    .field {
      margin-bottom: 18px;
    }
 
    label {
      display: block;
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
 
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      transition: border-color .2s;
    }
 
    input:focus {
      border-color: var(--accent);
    }
 
    input::placeholder { color: var(--muted); }
 
    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 5px;
    }
 
    button {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 14px;
      cursor: pointer;
      margin-top: 8px;
      transition: background .2s, transform .1s;
    }
 
    button:hover  { background: #00ffb3; }
    button:active { transform: scale(0.98); }
 
    #msg {
      min-height: 20px;
      font-size: 13px;
      text-align: center;
      margin-top: 16px;
      transition: color .2s;
    }
 
    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 13px;
      color: var(--muted);
    }
 
    .footer a {
      color: var(--accent);
      text-decoration: none;
    }
 
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⬡ AuthSystem</div>
    <h1>Create account</h1>
    <p class="subtitle">Start with a secure passwordless-ready setup</p>
 
    <div class="field">
      <label for="full_name">Full Name</label>
      <input id="full_name" type="text" placeholder="e.g. Aarush Negi" autocomplete="name">
    </div>

    <div class="field">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="e.g. aarush_dev" autocomplete="username">
      <p class="hint">Letters, numbers, _ . — (3–32 chars)</p>
    </div>

    <div class="field">
      <label for="mobile">Mobile Number</label>
      <input id="mobile" type="tel" placeholder="e.g. 9876543210" autocomplete="tel">
    </div>

    <div class="field">
      <label for="dob">Date of Birth</label>
      <input id="dob" type="date" autocomplete="bday">
    </div>
 
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Minimum 8 characters" autocomplete="new-password">
    </div>
 
    <button onclick="signup()">CREATE ACCOUNT</button>
 
    <p id="msg"></p>
 
    <div class="footer">
      Already have an account? <a href="/sign">Sign in</a>
    </div>
  </div>
 
  <!-- auth.js is the ONLY place signup() is defined -->
  <script src="/static/auth.js"></script>
</body>
</html>
